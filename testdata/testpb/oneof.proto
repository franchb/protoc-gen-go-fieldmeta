edition = "2023";

package testpb;

import "fieldmeta/v1/options.proto";

option go_package = "github.com/franchb/protoc-gen-go-fieldmeta/testdata/testpb;testpb";

message Event {
  string event_id = 1 [
    (fieldmeta.v1.log) = "event_id"
  ];

  oneof payload {
    string text = 2 [
      (fieldmeta.v1.log) = "text_payload"
    ];
    bytes binary = 3 [
      (fieldmeta.v1.sensitive) = true
    ];
  }
}
